<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI見積もりアシスタント (複数品番対応)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-bg: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --border: #e5e7eb;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-main);
            margin: 0;
            padding: 2rem;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 1rem;
        }

        .header h1 {
            margin: 0;
            font-size: 2.2rem;
            color: var(--text-main);
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .header p {
            color: var(--text-muted);
            margin-top: 0.5rem;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            padding: 2rem;
            border: 1px solid var(--border);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .card:focus-within {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.08);
            border-color: #bfdbfe;
        }

        .card h2 {
            margin-top: 0;
            margin-bottom: 1.5rem;
            font-size: 1.25rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-main);
            border-bottom: 2px solid var(--primary-bg);
            padding-bottom: 0.75rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.25rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        label {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-main);
        }

        .help-text {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        input,
        select {
            padding: 0.6rem 0.75rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 16px;
            /* スマホ(iOS)の自動ズーム防止 */
            font-family: inherit;
            color: var(--text-main);
            transition: border-color 0.2s, box-shadow 0.2s;
            background-color: #fafafa;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
            background-color: #fff;
        }

        .dynamic-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1rem;
        }

        .dynamic-table th,
        .dynamic-table td {
            text-align: left;
            padding: 0.75rem;
        }

        .dynamic-table th {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 600;
            border-bottom: 2px solid var(--border);
        }

        .dynamic-table td {
            border-bottom: 1px solid var(--border);
        }

        .dynamic-table input,
        .dynamic-table select {
            width: 100%;
            box-sizing: border-box;
            min-width: 95px;
            /* プルダウン文字の隠れ防止 */
            margin: 0;
        }

        /* 名称入力欄はある程度の幅を確保 */
        .dynamic-table .p-name,
        .dynamic-table .o-name {
            min-width: 140px;
        }

        .btn-icon {
            background: none;
            border: none;
            color: var(--danger);
            cursor: pointer;
            font-size: 1.1rem;
            padding: 0.4rem;
            border-radius: 4px;
            transition: background 0.2s, color 0.2s;
        }

        .btn-icon:hover {
            background: #fee2e2;
            color: #b91c1c;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.6rem 1.2rem;
            border: none;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .btn-secondary {
            background-color: var(--primary-bg);
            color: var(--text-main);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background-color: #e5e7eb;
        }

        .btn-primary {
            background-color: var(--accent);
            color: white;
            padding: 1rem 2rem;
            font-size: 1.1rem;
            font-weight: 600;
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.4);
            width: 100%;
        }

        .btn-primary:hover {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 8px -1px rgba(59, 130, 246, 0.5);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn.success {
            background-color: var(--success);
            box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.4);
        }

        .action-bar {
            position: sticky;
            bottom: 20px;
            z-index: 100;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--border);
            display: flex;
            gap: 1rem;
        }

        /* Tooltip */
        .copy-tooltip {
            position: absolute;
            bottom: calc(100% + 10px);
            left: 50%;
            transform: translateX(-50%);
            background: var(--text-main);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            font-size: 0.85rem;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s, transform 0.3s;
        }

        .copy-tooltip.show {
            opacity: 1;
            transform: translateX(-50%) translateY(-5px);
        }

        /* テーブルのレスポンシブ対応用ラッパー */
        .table-responsive {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            margin-bottom: 1rem;
        }

        /* モバイル最適化（レスポンシブデザイン） */
        @media (max-width: 768px) {
            body {
                padding: 1rem 0.5rem;
            }

            .card {
                padding: 1.25rem;
            }

            .header h1 {
                font-size: 1.5rem;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .dynamic-table {
                min-width: 550px;
                /* はみ出させて横スクロールさせる */
                margin-bottom: 0;
            }

            .btn-secondary {
                width: 100%;
                padding: 0.8rem;
                margin-top: 0.5rem;
            }

            .action-bar {
                padding: 0.75rem;
                bottom: 10px;
                flex-direction: column;
            }

            .btn-primary {
                padding: 0.8rem 1rem;
                font-size: 1rem;
            }
        }

        .global-card {
            background: #f8fafc;
            border: 2px solid var(--accent);
            margin-bottom: 2rem;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .global-card h2 {
            margin-top: 0;
            color: var(--accent);
            font-size: 1.4rem;
            border-bottom: 2px solid var(--accent);
            padding-bottom: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .item-card {
            border: 2px solid #cbd5e1;
            border-radius: 12px;
            background: white;
            margin-bottom: 2rem;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            transition: border-color 0.3s;
        }

        .item-card:hover {
            border-color: #94a3b8;
        }

        .item-header {
            background: var(--primary-bg);
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .item-header h3 {
            margin: 0;
            font-size: 1.2rem;
            color: var(--text-main);
        }

        .item-body {
            padding: 1.5rem;
        }

        .item-section {
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 2px dashed var(--border);
        }

        .item-section h4 {
            margin-top: 0;
            color: var(--text-main);
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .btn-add-item {
            display: block;
            width: 100%;
            padding: 1rem;
            background: white;
            border: 2px dashed var(--accent);
            color: var(--accent);
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 12px;
            transition: all 0.2s;
            text-align: center;
        }

        .btn-add-item:hover {
            background: #eff6ff;
        }

        .btn-remove-item {
            background: #fee2e2;
            color: #b91c1c;
            border: none;
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .btn-remove-item:hover {
            background: #fca5a5;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1><i class="fa-solid fa-robot"></i> AI見積もりアシスタント (複数一括)</h1>
            <p>※案件の共通条件と、各部品の個別条件（工程・外注等）を入力し、AI向けテキストをコピーします。</p>
        </div>

        <!-- 【1】案件共通設定 -->
        <div class="global-card">
            <h2><i class="fa-solid fa-building"></i> 案件 共通設定</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label>日付</label>
                    <input type="date" id="g-date">
                </div>
                <div class="form-group">
                    <label>顧客名</label>
                    <input type="text" id="g-customer" placeholder="例: 株式会社〇〇">
                </div>
                <div class="form-group">
                    <label>案件名</label>
                    <input type="text" id="g-project" placeholder="例: 新規設備部品製作">
                </div>
                <div class="form-group">
                    <label>見積依頼No.</label>
                    <input type="text" id="g-reqNo" placeholder="例: REQ-2026-001">
                </div>
                <div class="form-group"
                    style="grid-column: 1 / -1; border-top: 1px solid #e2e8f0; padding-top: 1rem; margin-top: 0.5rem;">
                    <p style="margin:0 0 10px 0; font-weight:bold; color:var(--accent);">💰 全体共通の原価設定</p>
                </div>
                <div class="form-group">
                    <label>時間単価（円/時間）</label>
                    <input type="number" id="g-hourlyRate" min="0" step="1" placeholder="例: 4200" value="4200">
                </div>
                <div class="form-group">
                    <label>諸経費率 (倍率)</label>
                    <input type="number" id="g-overheadRate" min="1" step="0.1" placeholder="例: 2.0" value="1.5">
                </div>
                <div class="form-group" style="grid-column: 1 / -1; margin-top: 5px;">
                    <label style="display:flex; align-items:center; cursor:pointer;">
                        <input type="checkbox" id="g-simpleEstimate"
                            style="width:auto; margin-right:8px; margin-bottom:0; min-width:auto;">
                        <span style="font-weight:bold; color:var(--danger);">簡易見積を出力する（内訳と工程分析を省略）</span>
                    </label>
                </div>
            </div>
        </div>

        <!-- 【2】アイテムリスト（部品ごと） -->
        <div id="itemList">
            <!-- 初期表示アイテムはJSで生成 -->
        </div>

        <button class="btn-add-item" onclick="addItem()"><i class="fa-solid fa-circle-plus"></i> 新しい部品（型番）を追加する</button>

        <!-- Action Bar -->
        <div class="action-bar" style="position: relative; margin-top: 2rem; flex-wrap: wrap;">
            <div class="copy-tooltip" id="copyTooltip">AI用テキストをコピーしました！</div>
            <button class="btn btn-secondary" onclick="exportData()" style="flex: 1; min-width: 150px;">
                <i class="fa-solid fa-download"></i> 入力データを保存
            </button>
            <button class="btn btn-secondary" onclick="document.getElementById('fileInput').click()"
                style="flex: 1; min-width: 150px;">
                <i class="fa-solid fa-upload"></i> 保存データを読込
            </button>
            <input type="file" id="fileInput" accept=".json" style="display:none;" onchange="importData(event)">

            <button class="btn-primary" id="copyBtn" onclick="generateAndCopy()" style="flex: 2; min-width: 250px;">
                <i class="fa-solid fa-copy"></i> すべてまとめてAIに投げるテキストをコピー
            </button>
        </div>
    </div>

    <datalist id="outsource-options">
        <option value="機械加工"></option>
        <option value="板金・溶接"></option>
        <option value="熱処理（焼き入れ・焼き戻し・浸炭・高周波など）"></option>
        <option value="表面処理（メッキ・アルマイト・黒染め・パーカー処理など）"></option>
        <option value="塗装"></option>
        <option value="組立"></option>
        <option value="設計"></option>
        <option value="制御盤製作"></option>
        <option value="電気工事"></option>
        <!-- その他の汎用候補 -->
        <option value="材料手配（素材購入）"></option>
        <option value="購入品（市販部品・規格品）"></option>
        <option value="レーザー・ウォータージェット加工"></option>
        <option value="研磨・ブラスト処理"></option>
        <option value="検査・測定"></option>
        <option value="梱包・輸送費"></option>
    </datalist>

    <!-- テンプレート要素（JSでクローン用） -->
    <template id="item-template">
        <div class="item-card">
            <div class="item-header">
                <h3 class="item-title">型番: <span class="disp-model">未入力</span></h3>
                <button class="btn-remove-item" onclick="removeItem(this)">削除</button>
            </div>
            <div class="item-body">
                <!-- 個別見積条件 -->
                <div class="form-grid">
                    <div class="form-group">
                        <label>型番</label>
                        <input type="text" class="i-modelID" placeholder="例: A-100" oninput="updateItemTitle(this)">
                    </div>
                    <div class="form-group">
                        <label>製品名</label>
                        <input type="text" class="i-productName" placeholder="例: ブラケット">
                    </div>
                    <div class="form-group">
                        <label>今回のお見積もり数量（個）</label>
                        <input type="number" class="i-orderQty" min="1" step="1" placeholder="例: 300">
                    </div>
                    <div class="form-group">
                        <label>材料費（円/個）</label>
                        <input type="number" class="i-materialCost" min="0" step="1" placeholder="例: 95">
                    </div>
                    <div class="form-group">
                        <label>ロット作業1回で処理数 <span class="help-text">空欄なら受注数1回</span></label>
                        <input type="number" class="i-lotSize" min="1" step="1" placeholder="例: 50">
                    </div>
                    <div class="form-group">
                        <label>納期などの管理メモ</label>
                        <input type="text" class="i-deliveryMemo" placeholder="例: 3週間以内">
                    </div>
                </div>

                <!-- 外注費 -->
                <div class="item-section">
                    <h4 style="color: var(--warning);"><i class="fa-solid fa-truck-fast"></i> 外注・処理費用（オプション）</h4>
                    <div class="table-responsive">
                        <table class="dynamic-table i-outsourceTable">
                            <thead>
                                <tr>
                                    <th>外注工程名 / 業者名</th>
                                    <th>単価（円）</th>
                                    <th>単位</th>
                                    <th>LT（日数）</th>
                                    <th style="width: 40px;"></th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                    <button class="btn btn-secondary" style="font-size:0.85rem;" onclick="addOutsourceRow(this)"><i
                            class="fa-solid fa-plus"></i> 外注を追加</button>
                </div>

                <!-- 内製工程 -->
                <div class="item-section">
                    <h4><i class="fa-solid fa-gears"></i> 内製 工程データ</h4>
                    <div class="table-responsive">
                        <table class="dynamic-table i-processTable">
                            <thead>
                                <tr>
                                    <th>工程名</th>
                                    <th>所要時間</th>
                                    <th>単位</th>
                                    <th>適用範囲</th>
                                    <th style="width: 40px;"></th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                    <button class="btn btn-secondary" style="font-size:0.85rem;" onclick="addProcessRow(this)"><i
                            class="fa-solid fa-plus"></i> 工程を追加</button>
                </div>

                <!-- 割引 -->
                <div class="item-section">
                    <h4><i class="fa-solid fa-tags"></i> 数量スライド割引設定 (オプション)</h4>
                    <div class="table-responsive">
                        <table class="dynamic-table i-discountTable">
                            <thead>
                                <tr>
                                    <th>条件 (個以上)</th>
                                    <th>材料費 倍率</th>
                                    <th>時間単価 倍率</th>
                                    <th style="width: 40px;"></th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                    <button class="btn btn-secondary" style="font-size:0.85rem;" onclick="addDiscountRow(this)"><i
                            class="fa-solid fa-plus"></i> 割引を追加</button>
                </div>

            </div>
        </div>
    </template>

    <script>
        // 日付の初期化
        document.getElementById('g-date').valueAsDate = new Date();

        // アイテム追加
        let itemIndex = 0;
        function addItem() {
            itemIndex++;
            const template = document.getElementById('item-template');
            const clone = template.content.cloneNode(true);
            const itemCard = clone.querySelector('.item-card');

            // 最初の行は1つ入れておく
            addProcessRowInternal(itemCard.querySelector('.i-processTable tbody'));

            // 初回アイテムは削除ボタンを隠す（最低1つは残す場合。今回は任意で全部消しても再度足せるようにする）
            if (itemIndex === 1 && document.getElementById('itemList').children.length === 0) {
                itemCard.querySelector('.btn-remove-item').style.display = 'none';
            }

            document.getElementById('itemList').appendChild(clone);
        }

        function removeItem(btn) {
            if (confirm("この部品を削除してもよろしいですか？")) {
                btn.closest('.item-card').remove();
            }
        }

        function updateItemTitle(input) {
            const val = input.value || "未入力";
            input.closest('.item-card').querySelector('.disp-model').textContent = val;
        }

        // 行追加・削除処理
        function getTbody(btn, tableClass) {
            return btn.closest('.item-section').querySelector('.' + tableClass + ' tbody');
        }

        function removeRow(btn) {
            btn.closest('tr').remove();
        }

        function addProcessRow(btn) {
            const tbody = getTbody(btn, 'i-processTable');
            addProcessRowInternal(tbody);
        }

        function addProcessRowInternal(tbody, name = "", time = "", unit = "分", scope = "個") {
            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td><input type="text" class="p-name" value="${name}" placeholder="工程名"></td>
                <td><input type="number" class="p-time" value="${time}" placeholder="数値" min="0" step="0.1"></td>
                <td>
                    <select class="p-unit">
                        <option value="時間">時間</option>
                        <option value="分" selected>分</option>
                        <option value="秒">秒</option>
                    </select>
                </td>
                <td>
                    <select class="p-scope">
                        <option value="個">個</option>
                        <option value="ロット">ロット</option>
                    </select>
                </td>
                <td><button tabindex="-1" class="btn-icon" onclick="removeRow(this)"><i class="fa-solid fa-trash"></i></button></td>
            `;
            // select状態復元
            if (unit) tr.querySelector('.p-unit').value = unit;
            if (scope) tr.querySelector('.p-scope').value = scope;
            tbody.appendChild(tr);
        }

        function addOutsourceRow(btn, name = "", cost = "", unit = "個", days = "") {
            const tbody = getTbody(btn, 'i-outsourceTable');
            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td><input type="text" class="o-name" value="${name}" list="outsource-options" placeholder="処理名"></td>
                <td><input type="number" class="o-cost" value="${cost}" placeholder="金額" min="0" step="1"></td>
                <td>
                    <select class="o-unit">
                        <option value="個" ${unit === '個' ? 'selected' : ''}>個</option>
                        <option value="ロット" ${unit === 'ロット' ? 'selected' : ''}>一式(ロット)</option>
                    </select>
                </td>
                <td><input type="number" class="o-days" value="${days}" placeholder="日数" min="0" step="1"></td>
                <td><button tabindex="-1" class="btn-icon" onclick="removeRow(this)"><i class="fa-solid fa-trash"></i></button></td>
            `;
            tbody.appendChild(tr);
        }

        function addDiscountRow(btn) {
            const tbody = getTbody(btn, 'i-discountTable');
            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td><input type="number" class="d-limit" placeholder="個" min="1"></td>
                <td><input type="number" class="d-mat" placeholder="倍率" step="0.01"></td>
                <td><input type="number" class="d-time" placeholder="倍率" step="0.01"></td>
                <td><button tabindex="-1" class="btn-icon" onclick="removeRow(this)"><i class="fa-solid fa-trash"></i></button></td>
            `;
            tbody.appendChild(tr);
        }

        // データ抽出と生成
        function generateAndCopy() {
            const items = document.querySelectorAll('.item-card');
            if (items.length === 0) {
                alert("部品（アイテム）を1つ以上追加してください。");
                return;
            }

            // 共通データ
            let text = "【案件共通設定】\n";
            text += `日付\t${document.getElementById('g-date').value}\n`;
            text += `顧客名\t${document.getElementById('g-customer').value || ''}\n`;
            text += `案件名\t${document.getElementById('g-project').value || ''}\n`;
            text += `見積依頼No.\t${document.getElementById('g-reqNo').value || ''}\n`;
            text += `時間単価（円/時間）\t${document.getElementById('g-hourlyRate').value || '0'}\n`;
            text += `諸経費率\t${document.getElementById('g-overheadRate').value || '1'}\n`;

            const isSimple = document.getElementById('g-simpleEstimate').checked;
            text += `簡易見積出力\t${isSimple ? '要' : '不要'}\n`;

            text += "\n=====================================\n";

            // 個別データ
            items.forEach((card, idx) => {
                let itemNo = idx + 1;
                text += `\n↓↓【部品 ${itemNo}】の見積もり条件 ↓↓\n\n`;
                text += `型番\t${card.querySelector('.i-modelID').value || '未入力'}\n`;
                text += `製品名\t${card.querySelector('.i-productName').value || '未入力'}\n`;
                text += `材料費（円/個）\t${card.querySelector('.i-materialCost').value || '0'}\n`;
                text += `今回のお見積もり数量（個）\t${card.querySelector('.i-orderQty').value || '0'}\n`;
                text += `ロット作業1回で処理できる個数\t${card.querySelector('.i-lotSize').value || ''}\n`;
                text += `納期など管理メモ\t${card.querySelector('.i-deliveryMemo').value || ''}\n`;

                // 外注費
                const outRows = card.querySelectorAll('.i-outsourceTable tbody tr');
                if (outRows.length > 0) {
                    text += "\n【外注費・納期データ（オプション）】\n外注工程名 / 業者名\t単価（円）\t単位\tリードタイム（納期/日数）\n";
                    outRows.forEach(tr => {
                        let name = tr.querySelector('.o-name').value;
                        let cost = tr.querySelector('.o-cost').value || '0';
                        let unit = tr.querySelector('.o-unit').value;
                        let days = tr.querySelector('.o-days').value || '';
                        if (name) text += `${name}\t${cost}\t${unit}\t${days}\n`;
                    });
                }

                // 内製工程
                const procRows = card.querySelectorAll('.i-processTable tbody tr');
                text += "\n【内製 工程データ】\n工程名\t所要時間\t単位\t適用範囲\n";
                let hasProc = false;
                procRows.forEach(tr => {
                    let name = tr.querySelector('.p-name').value;
                    let time = tr.querySelector('.p-time').value;
                    let unit = tr.querySelector('.p-unit').value;
                    let scope = tr.querySelector('.p-scope').value;
                    if (name && time) {
                        text += `${name}\t${time}\t${unit}\t${scope}\n`;
                        hasProc = true;
                    }
                });
                if (!hasProc) text += "なし\n";

                // 割引
                const discRows = card.querySelectorAll('.i-discountTable tbody tr');
                if (discRows.length > 0) {
                    text += "\n【数量スライド割引設定（オプション・使わない場合は空欄）】\n条件（個以上）\t材料費割引倍率\t時間単価割引倍率\n";
                    discRows.forEach(tr => {
                        let limit = tr.querySelector('.d-limit').value;
                        let mat = tr.querySelector('.d-mat').value || '1';
                        let time = tr.querySelector('.d-time').value || '1';
                        if (limit) text += `${limit}\t${mat}\t${time}\n`;
                    });
                }

                text += "\n-------------------------------------\n";
            });

            navigator.clipboard.writeText(text).then(() => {
                // Tooltip Animation
                const tooltip = document.getElementById("copyTooltip");
                tooltip.classList.add("show");
                setTimeout(() => { tooltip.classList.remove("show"); }, 2000);
            }).catch(err => {
                console.error("Copy failed", err);
                alert("コピーに失敗しました。お使いのブラウザは対応していないか、テキストエリア等を手動でコピーしてください。\n\n" + text);
            });
        }

        // ======= データ保存・読込処理 =======
        function exportData() {
            const data = {
                global: {
                    date: document.getElementById('g-date').value,
                    customer: document.getElementById('g-customer').value,
                    project: document.getElementById('g-project').value,
                    reqNo: document.getElementById('g-reqNo').value,
                    hourlyRate: document.getElementById('g-hourlyRate').value,
                    overheadRate: document.getElementById('g-overheadRate').value,
                    simpleEstimate: document.getElementById('g-simpleEstimate').checked
                },
                items: []
            };

            const items = document.querySelectorAll('.item-card');
            items.forEach(card => {
                const item = {
                    modelID: card.querySelector('.i-modelID').value,
                    productName: card.querySelector('.i-productName').value,
                    orderQty: card.querySelector('.i-orderQty').value,
                    materialCost: card.querySelector('.i-materialCost').value,
                    lotSize: card.querySelector('.i-lotSize').value,
                    deliveryMemo: card.querySelector('.i-deliveryMemo').value,
                    outsource: [],
                    process: [],
                    discount: []
                };

                card.querySelectorAll('.i-outsourceTable tbody tr').forEach(tr => {
                    item.outsource.push({
                        name: tr.querySelector('.o-name').value,
                        cost: tr.querySelector('.o-cost').value,
                        unit: tr.querySelector('.o-unit').value,
                        days: tr.querySelector('.o-days').value
                    });
                });

                card.querySelectorAll('.i-processTable tbody tr').forEach(tr => {
                    item.process.push({
                        name: tr.querySelector('.p-name').value,
                        time: tr.querySelector('.p-time').value,
                        unit: tr.querySelector('.p-unit').value,
                        scope: tr.querySelector('.p-scope').value
                    });
                });

                card.querySelectorAll('.i-discountTable tbody tr').forEach(tr => {
                    item.discount.push({
                        limit: tr.querySelector('.d-limit').value,
                        mat: tr.querySelector('.d-mat').value,
                        time: tr.querySelector('.d-time').value
                    });
                });

                data.items.push(item);
            });

            // ファイル名生成: 日付_顧客名_案件名_見積データ.json
            let dateStr = data.global.date || new Date().toISOString().split('T')[0];
            let custStr = data.global.customer || '顧客未入力';
            let projStr = data.global.project ? "_" + data.global.project : "";
            let fileName = `${dateStr}_${custStr}${projStr}_見積データ.json`;

            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = fileName;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function (e) {
                try {
                    const data = JSON.parse(e.target.result);

                    // 共通データの復元
                    if (data.global) {
                        document.getElementById('g-date').value = data.global.date || '';
                        document.getElementById('g-customer').value = data.global.customer || '';
                        document.getElementById('g-project').value = data.global.project || '';
                        document.getElementById('g-reqNo').value = data.global.reqNo || '';
                        document.getElementById('g-hourlyRate').value = data.global.hourlyRate || '4200';
                        document.getElementById('g-overheadRate').value = data.global.overheadRate || '1.5';
                        document.getElementById('g-simpleEstimate').checked = data.global.simpleEstimate || false;
                    }

                    // 既存のアイテムをすべてクリア
                    document.getElementById('itemList').innerHTML = '';
                    itemIndex = 0;

                    // アイテムデータの復元
                    if (data.items && data.items.length > 0) {
                        data.items.forEach(item => {
                            itemIndex++;
                            const template = document.getElementById('item-template');
                            const clone = template.content.cloneNode(true);
                            const card = clone.querySelector('.item-card');

                            card.querySelector('.disp-model').textContent = item.modelID || '未入力';
                            card.querySelector('.i-modelID').value = item.modelID || '';
                            card.querySelector('.i-productName').value = item.productName || '';
                            card.querySelector('.i-orderQty').value = item.orderQty || '';
                            card.querySelector('.i-materialCost').value = item.materialCost || '';
                            card.querySelector('.i-lotSize').value = item.lotSize || '';
                            card.querySelector('.i-deliveryMemo').value = item.deliveryMemo || '';

                            const outTbody = card.querySelector('.i-outsourceTable tbody');
                            (item.outsource || []).forEach(o => {
                                const tr = document.createElement("tr");
                                tr.innerHTML = `
                                    <td><input type="text" class="o-name" value="${o.name || ''}" list="outsource-options" placeholder="処理名"></td>
                                    <td><input type="number" class="o-cost" value="${o.cost || ''}" placeholder="金額" min="0" step="1"></td>
                                    <td>
                                        <select class="o-unit">
                                            <option value="個" ${(o.unit === '個') ? 'selected' : ''}>個</option>
                                            <option value="ロット" ${(o.unit === 'ロット') ? 'selected' : ''}>一式(ロット)</option>
                                        </select>
                                    </td>
                                    <td><input type="number" class="o-days" value="${o.days || ''}" placeholder="日数" min="0" step="1"></td>
                                    <td><button tabindex="-1" class="btn-icon" onclick="removeRow(this)"><i class="fa-solid fa-trash"></i></button></td>
                                `;
                                outTbody.appendChild(tr);
                            });

                            const procTbody = card.querySelector('.i-processTable tbody');
                            (item.process || []).forEach(p => {
                                addProcessRowInternal(procTbody, p.name || "", p.time || "", p.unit || "分", p.scope || "個");
                            });

                            const discTbody = card.querySelector('.i-discountTable tbody');
                            (item.discount || []).forEach(d => {
                                const tr = document.createElement("tr");
                                tr.innerHTML = `
                                    <td><input type="number" class="d-limit" value="${d.limit || ''}" placeholder="個" min="1"></td>
                                    <td><input type="number" class="d-mat" value="${d.mat || ''}" placeholder="倍率" step="0.01"></td>
                                    <td><input type="number" class="d-time" value="${d.time || ''}" placeholder="倍率" step="0.01"></td>
                                    <td><button tabindex="-1" class="btn-icon" onclick="removeRow(this)"><i class="fa-solid fa-trash"></i></button></td>
                                `;
                                discTbody.appendChild(tr);
                            });

                            // Removeボタンの制御（1つしかない場合は消せないようにする等）
                            if (itemIndex === 1 && data.items.length === 1) {
                                let rmBtn = card.querySelector('.btn-remove-item');
                                if (rmBtn) rmBtn.style.display = 'none';
                            }

                            document.getElementById('itemList').appendChild(card);
                        });
                    } else {
                        // データにアイテムが無かった場合は新規を1つ出す
                        addItem();
                    }

                } catch (err) {
                    alert("データの読み込みに失敗しました。ファイルが破損しているか、対応していない形式です。");
                    console.error(err);
                } finally {
                    event.target.value = ''; // 同じファイルを再度選べるようにクリア
                }
            };
            reader.readAsText(file);
        }

        // 起動時に1回アイテム追加
        window.onload = function () {
            addItem();
        };
    </script>
</body>

</html>
